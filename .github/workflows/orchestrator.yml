name: Full Pipeline Orchestrator

on:
  workflow_dispatch:
    inputs:
      all:
        description: Run full pipeline for all enabled mods
        required: false
        default: true
        type: boolean
      mod_key:
        description: Run for a single mod (overrides --all)
        required: false
        type: string
      tag:
        description: Release tag override
        required: false
        type: string
      dry_run:
        description: Dry run (skip actual upload to Thunderstore)
        required: false
        type: boolean
        default: true
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: orchestrator
  cancel-in-progress: false

jobs:
  sync:
    uses: ./.github/workflows/sync.yml
    with:
      all: ${{ github.event_name == 'schedule' || inputs.all }}
      mod_key: ${{ inputs.mod_key || '' }}
      tag: ${{ inputs.tag || '' }}
    permissions:
      contents: write
    secrets: inherit

  build:
    needs: sync
    if: needs.sync.outputs.synced_mods != '[]' && needs.sync.outputs.synced_mods != ''
    strategy:
      max-parallel: 2
      matrix:
        mod: ${{ fromJSON(needs.sync.outputs.synced_mods) }}
    uses: ./.github/workflows/build-and-validate.yml
    with:
      mod_key: ${{ matrix.mod.mod_key }}
      version: ${{ matrix.mod.version }}
    permissions:
      contents: write
    secrets: inherit

  publish:
    needs: [sync, build]
    if: needs.build.result != 'failure'
    strategy:
      max-parallel: 1
      matrix:
        mod: ${{ fromJSON(needs.sync.outputs.synced_mods) }}
    uses: ./.github/workflows/publish.yml
    with:
      mod_key: ${{ matrix.mod.mod_key }}
      version: ${{ matrix.mod.version }}
      artifact_run_id: ${{ github.run_id }}
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
    permissions:
      contents: read
      actions: read
    secrets: inherit

  summary:
    needs: [sync, build, publish]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write pipeline summary
        run: |
          {
            echo "## Pipeline Summary"
            echo ""
            echo "**Trigger:** ${{ github.event_name }}"
            echo "**Run:** [\`${{ github.run_id }}\`](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
            echo "### Synced (进入 build/publish)"
            echo '```json'
            echo '${{ needs.sync.outputs.synced_mods }}'
            echo '```'
            echo ""
            echo "### Skipped (已是最新)"
            echo '```json'
            echo '${{ needs.sync.outputs.skipped_mods }}'
            echo '```'
            echo ""
            echo "| Phase | Status |"
            echo "|-------|--------|"
            echo "| sync | ${{ needs.sync.result }} |"
            echo "| build | ${{ needs.build.result }} |"
            echo "| publish | ${{ needs.publish.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
